apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appremediations.titlis.io
spec:
  group: titlis.io
  scope: Namespaced
  names:
    plural: appremediations
    singular: appremediation
    kind: AppRemediation
    shortNames:
      - ar
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Deployment
          type: string
          jsonPath: .spec.targetRef.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: PR
          type: integer
          jsonPath: .status.prNumber
        - name: Issues
          type: integer
          jsonPath: .status.issueCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetRef, issuesFixed, baseBranch]
              properties:
                targetRef:
                  type: object
                  required: [name, namespace]
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                issuesFixed:
                  type: array
                  items:
                    type: object
                    required: [ruleId, ruleName]
                    properties:
                      ruleId:
                        type: string
                      ruleName:
                        type: string
                      category:
                        type: string
                        enum: [resources, hpa]
                baseBranch:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [PRCreated, PRMerged, PRClosed, Failed]
                prNumber:
                  type: integer
                prUrl:
                  type: string
                prBranch:
                  type: string
                issueCount:
                  type: integer
                createdAt:
                  type: string
                  format: date-time
                updatedAt:
                  type: string
                  format: date-time
                error:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
