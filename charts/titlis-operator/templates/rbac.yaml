apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "titlis.fullname" . }}-clusterrole
rules:
  # Permissões para recursos do core API
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Permissões para apps API group
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/status
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Para os próprios CRDs do operator
  - apiGroups: ["titlis.io"]
    resources:
      - sloconfigs
      - sloconfigs/status
      - appscorecards
      - appscorecards/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Permissões para namespaces
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list", "watch"]

  # Permissão para listar CRDs (apiextensions.k8s.io)
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]  # Apenas permissões de leitura são necessárias
  
  # Permissões full para HorizontalPodAutoscalers
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
      - horizontalpodautoscalers/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
