[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow
    integration: integration tests
    unit: unit tests
asyncio_mode = auto

[filterwarnings]
ignore::DeprecationWarning